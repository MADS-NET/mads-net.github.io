    type: warning           # primary, secondary, success, warning, danger
    dismissable: true
  page-footer: 
    left: "Paolo Bosetti, [BY-NC-SA4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)" 
  navbar:
    left:
