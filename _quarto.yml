        menu:
          - text: Source Code
            href:  https://github.com/pbosetti/mads
          - text: Issues
            href: https://github.com/pbosetti/MADS/issues
          - text: Plugins
            href:  https://github.com/MADS-Net

format:
  html:
    toc: true
    email-obfuscation: "javascript"
    theme: 
      - flatly
      - brand
      - custom.scss
  revealjs:
    theme: [default, presentations/slides.scss]
    width: 1280
    height: 720
    margin: 0.1
    slide-number: true
    code-line-numbers: true
    code-annotations: below
    controls: true
    preview-links: auto
    chalkboard: true
    footer: "MADS --- [https://mads-net.github.io](https://mads-net.github.io)"
    fig-width: 5
    fig-height: 4
    fig-dpi: 300
    touch: true
    email-obfuscation: javascript
    pdf-separate-fragments: true
    link-external-icon: true
    lang: en-EN
